<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis enlaces</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f4f0;
      --ink: #1a1814;
      --muted: #7a776e;
      --accent: #c85a2a;
      --card-bg: #ffffff;
      --border: #e2dfd8;
      --header-h: 280px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      width: 100%;
      height: var(--header-h);
      background: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* textura de fondo sutil */
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(255,255,255,0.02) 40px,
          rgba(255,255,255,0.02) 80px
        );
    }

    /* franja de acento lateral */
    header::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent);
    }

    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 0 48px;
      animation: fadeDown 0.7s ease both;
    }

    .header-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 0 6px rgba(200,90,42,0.15);
    }

    /* fallback si la imagen no carga */
    .header-avatar-placeholder {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      flex-shrink: 0;
      background: #2e2c28;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: var(--accent);
      box-shadow: 0 0 0 6px rgba(200,90,42,0.15);
    }

    .header-text { text-align: left; }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: #fff;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header-text h1 em {
      color: var(--accent);
      font-style: italic;
    }

    .header-text p {
      margin-top: 8px;
      font-size: 0.875rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── ESTADO ── */
    #estado {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 48px 0;
      display: none;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    /* ── GRILLA ── */
    #lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 24px;
    }

    /* ── TARJETA ── */
    .tarjeta {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .tarjeta::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .tarjeta:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
      transform: translateY(-4px);
      border-color: transparent;
    }

    .tarjeta:hover::before { transform: scaleX(1); }

    .tarjeta-titulo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      line-height: 1.3;
    }

    .tarjeta-qr {
      width: 150px;
      height: 150px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: block;
    }

    .tarjeta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 22px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
    }

    .tarjeta-btn:hover {
      background: var(--accent);
      transform: scale(1.04);
    }

    .tarjeta-btn svg { flex-shrink: 0; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── ANIMACIONES ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .header-inner { flex-direction: column; text-align: center; gap: 16px; padding: 0 24px; }
      .header-text { text-align: center; }
      :root { --header-h: 320px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <img
        class="header-avatar"
        src="image.jpg"
        alt="Avatar"
        onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'header-avatar-placeholder', textContent:'👤'}))"
      >
      <div class="header-text">
        <h1>Mis <em>enlaces</em></h1>
        <p>Recursos y herramientas digitales</p>
      </div>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <div id="estado">
      <div class="spinner"></div>
      Cargando recursos…
    </div>
    <div id="lista"></div>
  </main>

  <footer>
    Actualizado automáticamente desde Google Sheets
  </footer>

  <script>
    const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTyIiVfVXUrDd9siaOe8XwKpAwjQToL8M7gq98sFQqH7vp0-Cr4ulaFYwz2-kvWOeDEzE1Nb98qKCy8/pub?output=csv";

    const estado     = document.getElementById("estado");
    const contenedor = document.getElementById("lista");

    estado.style.display = "block";

    fetch(sheetCSV)
      .then(res => {
        if (!res.ok) throw new Error("Error al cargar el CSV");
        return res.text();
      })
      .then(data => {
        estado.style.display = "none";

        const filas = data.split("\n").slice(1); // saltar encabezado si existe

        let agregados = 0;

        filas.forEach((fila, i) => {
          // manejo de comas dentro de comillas
          const columnas = fila.match(/(".*?"|[^",\r]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || fila.split(",");
          const limpiar  = s => s ? s.replace(/^"|"$/g, "").trim() : "";

          const titulo = limpiar(columnas[0]);
          const link   = limpiar(columnas[1]);
          const activo = limpiar(columnas[2]);

          if (!titulo || !link || activo !== "TRUE") return;

          const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(link);

          const tarjeta = document.createElement("div");
          tarjeta.className = "tarjeta";
          tarjeta.style.animationDelay = `${agregados * 80}ms`;

          tarjeta.innerHTML = `
            <span class="tarjeta-titulo">${titulo}</span>
            <img class="tarjeta-qr" src="${qrUrl}" alt="QR ${titulo}" loading="lazy">
            <a class="tarjeta-btn" href="${link}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              Abrir enlace
            </a>
          `;

          contenedor.appendChild(tarjeta);
          agregados++;
        });

        if (agregados === 0) {
          estado.style.display = "block";
          estado.innerHTML = "<p>No se encontraron enlaces activos.</p>";
        }
      })
      .catch(err => {
        estado.style.display = "block";
        estado.innerHTML = `<p>⚠️ ${err.message}</p>`;
      });
  </script>

</body>
</html>
