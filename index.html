<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis enlaces</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f4f0;
      --ink: #1a1814;
      --muted: #7a776e;
      --accent: #c85a2a;
      --card-bg: #ffffff;
      --border: #e2dfd8;
      --header-h: 280px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding-top: var(--header-h);
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      position: relative;
      width: 100%;
      height: var(--header-h);
      background: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 40px,
        rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px
      );
    }

    header::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent);
    }

    .header-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 32px;
      padding: 0 48px;
      animation: fadeDown 0.7s ease both;
    }

    .header-avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 0 6px rgba(200,90,42,0.15);
    }

    .header-avatar-placeholder {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      flex-shrink: 0;
      background: #2e2c28;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
    }

    .header-text h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: #fff;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .header-text h1 em { color: var(--accent); font-style: italic; }

    .header-text p {
      margin-top: 8px;
      font-size: 0.875rem;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-refresh {
      position: absolute;
      bottom: 16px; right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.04em;
    }

    .refresh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    .refresh-dot.pulsing { animation: pulse-dot 1s ease-out; }

    .refresh-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.06);
    }

    .refresh-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      opacity: 0.6;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    #estado {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 48px 0;
      display: none;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    #lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 24px;
    }

    .tarjeta {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.5s ease forwards;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .tarjeta::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .tarjeta:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.10); transform: translateY(-4px); border-color: transparent; }
    .tarjeta:hover::before { transform: scaleX(1); }

    .tarjeta-titulo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--ink);
      line-height: 1.3;
    }

    .tarjeta-qr {
      width: 150px; height: 150px;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: block;
    }

    .tarjeta-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 22px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.15s;
    }

    .tarjeta-btn:hover { background: var(--accent); transform: scale(1.04); }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* debug panel */
    #debug {
      display: none;
      background: #1a1814;
      color: #c8f0a0;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 16px 24px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { to   { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to   { transform:rotate(360deg); } }
    @keyframes pulse-dot { 0% { opacity:1; transform:scale(1.8); } 100% { opacity:0.5; transform:scale(1); } }

    @media (max-width: 520px) {
      .header-inner { flex-direction:column; text-align:center; gap:16px; padding:0 24px; }
      :root { --header-h: 320px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <img
        class="header-avatar"
        src="image.jpg"
        alt="Avatar"
        onerror="this.replaceWith(Object.assign(document.createElement('div'), {className:'header-avatar-placeholder', textContent:'📚'}))"
      >
      <div class="header-text">
        <h1>Mis <em>enlaces</em></h1>
        <p>Recursos y herramientas digitales</p>
      </div>
    </div>
    <div class="refresh-bar">
      <div class="refresh-bar-fill" id="barraProgreso"></div>
    </div>
    <div class="header-refresh">
      <div class="refresh-dot" id="refreshDot"></div>
      <span id="refreshLabel">Cargando…</span>
    </div>
  </header>

  <pre id="debug"></pre>

  <main>
    <div id="estado">
      <div class="spinner"></div>
      Cargando recursos…
    </div>
    <div id="lista"></div>
  </main>

  <footer>
    Actualizado automáticamente desde Google Sheets · cada 1 minuto
  </footer>

  <script>
    const sheetCSV     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTyIiVfVXUrDd9siaOe8XwKpAwjQToL8M7gq98sFQqH7vp0-Cr4ulaFYwz2-kvWOeDEzE1Nb98qKCy8/pub?output=csv";
    const INTERVALO_MS = 60 * 1000;

    const estado        = document.getElementById("estado");
    const contenedor    = document.getElementById("lista");
    const refreshDot    = document.getElementById("refreshDot");
    const refreshLabel  = document.getElementById("refreshLabel");
    const barraProgreso = document.getElementById("barraProgreso");
    const debug         = document.getElementById("debug");

    // ── Parser CSV robusto (RFC 4180) ─────────────────────────────────────────
    // Maneja: comas dentro de comillas, saltos de línea, comillas escapadas
    function parsearCSV(texto) {
      const filas = [];
      let fila = [], campo = "", dentroComillas = false;

      for (let i = 0; i < texto.length; i++) {
        const c  = texto[i];
        const sig = texto[i + 1];

        if (dentroComillas) {
          if (c === '"' && sig === '"') { campo += '"'; i++; }       // "" → "
          else if (c === '"')           { dentroComillas = false; }  // cierre
          else                          { campo += c; }
        } else {
          if      (c === '"')  { dentroComillas = true; }
          else if (c === ',')  { fila.push(campo.trim()); campo = ""; }
          else if (c === '\n' || (c === '\r' && sig === '\n')) {
            if (c === '\r') i++;
            fila.push(campo.trim());
            if (fila.some(x => x !== "")) filas.push(fila); // ignorar filas vacías
            fila = []; campo = "";
          } else { campo += c; }
        }
      }
      // última fila sin salto final
      if (campo || fila.length) { fila.push(campo.trim()); if (fila.some(x => x !== "")) filas.push(fila); }

      return filas;
    }

    // ── Barra de progreso ─────────────────────────────────────────────────────
    function iniciarBarra() {
      barraProgreso.style.transition = "none";
      barraProgreso.style.width = "0%";
      barraProgreso.getBoundingClientRect();
      barraProgreso.style.transition = `width ${INTERVALO_MS}ms linear`;
      barraProgreso.style.width = "100%";
    }

    function horaActual() {
      return new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit" });
    }

    function pulsarDot() {
      refreshDot.classList.remove("pulsing");
      void refreshDot.offsetWidth;
      refreshDot.classList.add("pulsing");
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderizarTarjetas(filas) {
      let agregados = 0;
      const fragment = document.createDocumentFragment();

      filas.forEach(cols => {
        const titulo = cols[0] || "";
        const link   = cols[1] || "";
        const activo = (cols[2] || "").toUpperCase();

        if (!titulo || !link || (activo !== "TRUE" && activo !== "VERDADERO" && activo !== "1")) return;

        const qrUrl  = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(link);
        const tarjeta = document.createElement("div");
        tarjeta.className = "tarjeta";
        tarjeta.style.animationDelay = `${agregados * 80}ms`;

        tarjeta.innerHTML = `
          <span class="tarjeta-titulo">${titulo}</span>
          <img class="tarjeta-qr" src="${qrUrl}" alt="QR ${titulo}" loading="lazy">
          <a class="tarjeta-btn" href="${link}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Abrir enlace
          </a>
        `;

        fragment.appendChild(tarjeta);
        agregados++;
      });

      return { fragment, agregados };
    }

    // ── Fetch ─────────────────────────────────────────────────────────────────
    function cargarDatos(esPrimeraCarga = false) {
      if (esPrimeraCarga) {
        estado.style.display = "block";
        estado.innerHTML = '<div class="spinner"></div>Cargando recursos…';
      }

      fetch(sheetCSV + "&t=" + Date.now())
        .then(res => {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(texto => {
          // mostrar primeras 3 filas en debug (activar con ?debug en la URL)
          if (location.search.includes("debug")) {
            debug.style.display = "block";
            const lineas = texto.split("\n").slice(0, 3);
            debug.textContent = "CSV (primeras 3 filas):\n" + lineas.map((l,i)=>`[${i}] ${l}`).join("\n");
          }

          const filas = parsearCSV(texto);
          const { fragment, agregados } = renderizarTarjetas(filas);
          const actuales = contenedor.querySelectorAll(".tarjeta").length;

          if (esPrimeraCarga || agregados !== actuales) {
            contenedor.innerHTML = "";
            if (agregados > 0) contenedor.appendChild(fragment);
          }

          estado.style.display = "none";

          if (agregados === 0) {
            estado.style.display = "block";
            estado.innerHTML = "<p>No hay enlaces activos (checkbox tildado).</p>";
          }

          pulsarDot();
          refreshLabel.textContent = "Actualizado " + horaActual();
          iniciarBarra();
        })
        .catch(err => {
          if (esPrimeraCarga) {
            estado.style.display = "block";
            estado.innerHTML = `<p>⚠️ ${err.message}</p>`;
          }
          refreshLabel.textContent = "⚠️ Sin conexión · " + horaActual();
        });
    }

    cargarDatos(true);
    setInterval(() => cargarDatos(false), INTERVALO_MS);
  </script>

</body>
</html>
