<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Mis enlaces</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

#lista{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:20px;
}

.tarjeta{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
width:220px;
}

.tarjeta img{
margin-top:10px;
}

</style>

</head>

<body>

<img src="image.jpg" width="250">

<h2>Mis enlaces</h2>

<div id="lista"></div>

<script>

const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTyIiVfVXUrDd9siaOe8XwKpAwjQToL8M7gq98sFQqH7vp0-Cr4ulaFYwz2-kvWOeDEzE1Nb98qKCy8/pub?output=csv";

fetch(sheetCSV)
.then(res => res.text())
.then(data => {

const filas = data.split("\n");

const contenedor = document.getElementById("lista");

filas.forEach(fila => {

let columnas = fila.split(",");

if(columnas.length < 3) return;

let titulo = columnas[0].trim();
let link = columnas[1].trim();
let activo = columnas[2].trim();

if(activo === "TRUE"){

let qr = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(link);

let tarjeta = document.createElement("div");
tarjeta.className = "tarjeta";

tarjeta.innerHTML = `
<h3>${titulo}</h3>
<a href="${link}" target="_blank">Abrir enlace</a>
<br><br>
<img src="${qr}" width="150">
`;

contenedor.appendChild(tarjeta);

}

});

});

</script>

</body>

</html>
