<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Mis enlaces</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
}

h1{
    margin-top:30px;
}

img{
    margin:20px;
    border-radius:10px;
}

ul{
    list-style:none;
    padding:0;
}

li{
    margin:10px;
}

a{
    text-decoration:none;
    font-size:18px;
    color:white;
    background:#0077cc;
    padding:10px 20px;
    border-radius:8px;
}

a:hover{
    background:#005fa3;
}
</style>

</head>

<body>

<h1>Mis enlaces</h1>

<img src="image.jpg" width="300">

<ul id="lista"></ul>

<script>

const url = "https://docs.google.com/spreadsheets/d/1rYgE9eltlWUaCED98TPYKmgVCYHoLhRZ8CG2WgSvtT0/export?format=csv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const filas = data.split("\n");
    const lista = document.getElementById("lista");

    filas.slice(1).forEach(fila => {

      const columnas = fila.split(",");

      const titulo = columnas[0];
      const link = columnas[1];

      if(titulo && link){
        lista.innerHTML += `
        <li>
            <a href="${link}" target="_blank">${titulo}</a>
        </li>
        `;
      }

    });

  });

</script>

</body>
</html>
